name: Tests

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  test:
    name: node --test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [ "18", "20", "22" ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run tests
        run: node --test
